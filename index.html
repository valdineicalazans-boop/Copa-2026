<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',sans-serif;background:#f0f2f5;color:#1a1a2e;height:100%;overflow:hidden}
:root{--navy:#1a1a2e;--mid:#16213e;--gold:#ffc800;--red:#c62828;--orange:#e65100;--blue:#1565c0;--green:#1b5e20;--grn-lt:#e8f5e9;--gold-lt:#fffde7;--border:#eaedf0;--muted:#7b8fa1;--white:#fff}
.topbar{background:var(--navy);padding:11px 32px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.3);flex-shrink:0}
.topbar-title{color:#fff;font-size:13px;font-weight:800}
.topbar-title span{color:var(--gold)}
.tabs-bar{background:var(--mid);display:flex;align-items:flex-end;padding:0 32px;gap:4px;flex-shrink:0}
.tab-btn{color:rgba(255,255,255,.55);padding:8px 18px;font-size:10px;font-weight:700;cursor:pointer;border:none;background:none;font-family:'Inter',sans-serif;border-radius:6px 6px 0 0;letter-spacing:.3px;transition:all .2s}
.tab-btn:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.08)}
.tab-btn.active{background:var(--white);color:var(--navy);padding-bottom:10px}
.toolbar{background:var(--white);border-bottom:1px solid var(--border);padding:10px 32px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;flex-shrink:0}
.flbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}
.fsel{border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:11px;color:var(--navy);background:var(--white);font-family:'Inter',sans-serif;cursor:pointer;min-width:160px}
.fsep{width:1px;background:var(--border);height:26px}
.kpi-strip{display:flex;margin-left:auto}
.ks{padding:4px 16px;border-left:1px solid var(--border);text-align:right}
.ks-val{font-size:15px;font-weight:800;color:var(--navy);line-height:1}
.ks-val.r{color:var(--red)}.ks-val.b{color:var(--blue)}
.ks-lbl{font-size:8.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.count-bar{padding:7px 32px;font-size:10.5px;color:var(--muted);background:#f8f9fb;border-bottom:1px solid var(--border);flex-shrink:0}
.page-wrap{display:flex;flex-direction:column;height:100vh}
.tab-panel{display:none;flex:1;flex-direction:column;overflow:hidden}
.tab-panel.active{display:flex}
.tbl-scroll{flex:1;overflow:auto;padding:0 32px 32px}
.master-tbl{width:100%;border-collapse:collapse;font-size:11.5px;background:var(--white);border:1px solid var(--border);min-width:1400px}
.master-tbl thead th{position:sticky;top:0;z-index:10;background:var(--navy);color:rgba(255,255,255,.88);padding:9px 11px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border:1px solid rgba(255,255,255,.1);text-align:center;vertical-align:bottom;white-space:nowrap;line-height:1.35}
.master-tbl thead th.thl{text-align:left}
.master-tbl thead th.thr{text-align:right}
.master-tbl td{padding:8px 11px;border:1px solid var(--border);vertical-align:middle}
.master-tbl tr.dr:hover td{background:#fafbfc}
.master-tbl tr.total td{background:#f0f2f5;font-weight:700;border-top:2px solid var(--navy)}
.c-cluster{font-size:10px;font-weight:600;white-space:nowrap}
.cl-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle}
.c-cad{font-weight:800;font-size:12.5px;white-space:nowrap;border-left:3px solid transparent!important}
.c-num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;font-weight:500}
.c-gap{text-align:right;font-weight:700;color:var(--red);white-space:nowrap}
.c-gap small{display:block;font-size:9.5px;font-weight:600}
.c-ctr{text-align:center;font-size:11px}
.c-txt{font-size:11px;line-height:1.5;color:#374151}
.c-hcs{text-align:right;font-weight:700;color:var(--blue)}
.empty{color:#c5bfb5;font-style:italic}
.footer{background:#f8f9fb;border-top:1px solid var(--border);padding:11px 32px;display:flex;justify-content:space-between;font-size:10.5px;color:#8896a7;flex-shrink:0}
.footer strong{color:var(--navy)}
</style>

function tv(x){return (x!==''&&x!==null&&x!==undefined)?x:'<span class="empty">—</span>';}
function tn(x){return x?fmt(x):'<span class="empty">—</span>';}

function renderJogo(jid){
  const s=state[jid];
  const ROWS=DATA[jid];
  const fCl=document.getElementById('fcl-'+jid);
  const cls=[...new Set(ROWS.map(r=>r[0]))];
  const prevCl=fCl.value||'all';
  fCl.innerHTML='<option value="all">Todos os Clusters</option>'+
    cls.map(c=>`<option value="${c}">${c===''?'(sem cluster)':c}</option>`).join('');
  fCl.value=prevCl;

  const byCluster=s.selCl==='all'?ROWS:ROWS.filter(r=>r[0]===s.selCl);
  const fCad=document.getElementById('fcad-'+jid);
  fCad.innerHTML='<option value="all">Todos os CADs</option>'+
    byCluster.map(r=>`<option value="${r[1]}">${r[1]}</option>`).join('');
  if(s.selCad!=='all'&&!byCluster.find(r=>r[1]===s.selCad)) s.selCad='all';
  fCad.value=s.selCad;

  let rows=byCluster;
  if(s.selCad!=='all') rows=rows.filter(r=>r[1]===s.selCad);

  let tB=0,tC=0,tH=0;
  let html='';
  rows.forEach(r=>{
    const b=Number(r[2])||0, c=Number(r[3])||0;
    tB+=b; tC+=c; tH+=Number(r[11])||0;
    const color=clr(r[0]);
    html+=`<tr class="dr">
      <td class="c-cluster"><span class="cl-dot" style="background:${color}"></span>${r[0]||'<span class="empty">—</span>'}</td>
      <td class="c-cad" style="border-left-color:${color}">${r[1]}</td>
      <td class="c-num">${tn(r[2])}</td><td class="c-num">${tn(r[3])}</td>
      <td class="c-gap">${r[4]?r[4]:'<span class="empty">—</span>'}</td>
      <td class="c-ctr">${tv(r[5])}</td>
      <td class="c-ctr" style="font-weight:${r[6]?'700':'400'}">${(r[6]!=='')?r[6]:'<span class="empty">—</span>'}</td>
      <td class="c-txt">${tv(r[7])}</td><td class="c-txt">${tv(r[8])}</td>
      <td class="c-txt">${tv(r[9])}</td><td class="c-ctr c-txt">${tv(r[10])}</td>
      <td class="c-hcs">${r[11]?fmt(r[11]):'<span class="empty">—</span>'}</td>
      <td class="c-txt">${tv(r[12])}</td><td class="c-txt">${tv(r[13])}</td>
      <td class="c-txt">${tv(r[14])}</td>
      <td class="c-txt">${tv(r[15])}</td>
      <td class="c-txt">${tv(r[16])}</td>
    </tr>`;
  });

  if(s.selCad==='all'&&rows.length>1){
    const tL=tB?tC-tB:0; const tP=tB?(tL/tB*100).toFixed(1):0;
    html+=`<tr class="total">
      <td></td><td class="c-cad" style="border-left-color:var(--navy);font-size:11px">TOTAL</td>
      <td class="c-num">${fmt(tB)}</td><td class="c-num">${fmt(tC)}</td>
      <td class="c-gap">${fmt(Math.abs(tB-tC))}<small>(${Math.abs(tP)}%)</small></td>
      <td colspan="6"></td><td class="c-hcs">${fmt(tH)}</td><td colspan="5"></td>
    </tr>`;
  }

  document.getElementById('tbody-'+jid).innerHTML=html;
  document.getElementById('count-'+jid).innerHTML=`<strong>${rows.length}</strong> CADs exibidos`;
  const tL=tB?tC-tB:0; const tP=tB?(tL/tB*100).toFixed(1):0;
  document.getElementById('kvb-'+jid).textContent=fmt(tB);
  document.getElementById('kvc-'+jid).textContent=fmt(tC);
  document.getElementById('kvl-'+jid).textContent=fmt(Math.abs(tL))+' ('+Math.abs(tP)+'%)';
  document.getElementById('kvh-'+jid).textContent=fmt(tH);
}

/* Grid: only allow approved Grid domains to open unsandboxed tabs */
(function(){
  var allowedHosts = ["figma.com", "www.figma.com", "furydocs.io", "zeroheight.com", "google.com", "docs.google.com", "meet.google.com", "grid.adminml.com", "grid-artifacts.adminml.com", "mercadolibre.atlassian.net", "mercadolibre-opsgenie.atlassian.net", "app.datadoghq.com", "grafana-service.furycloud.io", "web.furycloud.io", "nasdaq-meli.app.opsgenie.com", "meli.enterprise.slack.com"];
  var allowedSuffixes = [".adminml.com", ".atlassian.net", ".google.com", ".furycloud.io", ".melioffice.com", ".melisystems.com"];
  var allowedPathPrefixes = {"github.com": ["/melisource/"], "www.github.com": ["/melisource/"]};
  function normalizeUrl(rawUrl){
    try {
      return new URL(String(rawUrl || ""), window.location.href);
    } catch (_err) {
      return null;
    }
  }
  function isAllowedUrl(rawUrl){
    var parsed = normalizeUrl(rawUrl);
    if(!parsed) return false;
    if(parsed.protocol === "slack:") return true;
    if(parsed.protocol !== "https:") return false;
    var h = (parsed.hostname || "").toLowerCase();
    if(!h) return false;
    if(allowedHosts.indexOf(h) !== -1) return true;
    for(var i = 0; i < allowedSuffixes.length; i++){
      var s = allowedSuffixes[i];
      if(h === s.slice(1) || (h.length > s.length && h.slice(-s.length) === s)) return true;
    }
    var pathPrefixes = allowedPathPrefixes[h];
    if(pathPrefixes){
      var p = parsed.pathname || "/";
      for(var j = 0; j < pathPrefixes.length; j++){
        if(p.slice(0, pathPrefixes[j].length) === pathPrefixes[j]) return true;
      }
    }
    return false;
  }
  function requestParentPopup(rawUrl){
    var parsed = normalizeUrl(rawUrl);
    if(!parsed || !window.parent || window.parent === window) return false;
    try {
      window.parent.postMessage({type: "grid-open-safe-popup", url: parsed.href}, window.location.origin);
      return true;
    } catch (_err) {
      return false;
    }
  }

  document.addEventListener("click", function(event){
    var target = event.target;
    var anchor = target && target.closest ? target.closest("a[href]") : null;
    if(!anchor) return;
    var href = anchor.getAttribute("href") || "";
    if(!href || href.charAt(0) === "#") return;
    var opensNewTab = anchor.target === "_blank" || event.ctrlKey || event.metaKey || event.button === 1;
    if(!opensNewTab) return;
    if(!isAllowedUrl(href)) {
      event.preventDefault();
      event.stopPropagation();
      return;
    }
    if(requestParentPopup(href)) {
      event.preventDefault();
      event.stopPropagation();
    }
  }, true);

  var nativeOpen = window.open;
  window.open = function(rawUrl, target, features){
    if(!isAllowedUrl(rawUrl)) return null;
    if(requestParentPopup(rawUrl)) return null;
    return nativeOpen ? nativeOpen.call(window, normalizeUrl(rawUrl).href, target, features) : null;
  };
})();
</script>
<script>
/* Grid: sync iframe URL mutations to parent address bar */
(function(){
  function notifyParent(search, hash){
    if(!window.parent || window.parent === window) return;
    try{
      window.parent.postMessage(
        {type:"grid-url-sync", search:search, hash:hash},
        window.location.origin
      );
    }catch(_){}
  }
  function parseAndNotify(url){
    try{
      var p = new URL(String(url), window.location.href);
      notifyParent(p.search, p.hash);
    }catch(_){}
  }
  var _push = history.pushState.bind(history);
  var _replace = history.replaceState.bind(history);
  history.pushState = function(state, title, url){
    _push(state, title, url);
    if(url != null) parseAndNotify(url);
  };
  history.replaceState = function(state, title, url){
    _replace(state, title, url);
    if(url != null) parseAndNotify(url);
  };
  window.addEventListener("hashchange", function(){
    notifyParent(window.location.search, window.location.hash);
  });
})();
</script>
